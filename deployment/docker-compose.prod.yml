version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: whatsapp_panel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-whatsapp_panel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wp-net

  redis:
    image: redis:7-alpine
    container_name: whatsapp_panel_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - wp-net

  backend:
    build:
      context: ../backend
    container_name: whatsapp_panel_backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-whatsapp_panel}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5005
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-12345}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-super-secret-encryption-key-1234567890}
    depends_on:
      - postgres
      - redis
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wp-backend.rule=Host(`${API_DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/socket.io`))"
      - "traefik.http.routers.wp-backend.entrypoints=websecure"
      - "traefik.http.routers.wp-backend.tls.certresolver=myresolver"
      - "traefik.http.services.wp-backend.loadbalancer.server.port=5005"
    networks:
      - wp-net

  worker:
    build:
      context: ../backend
    container_name: whatsapp_panel_worker
    restart: always
    command: node workers/workflowWorker.js
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-user}:${DB_PASSWORD:-password}@postgres:5432/${DB_NAME:-whatsapp_panel}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=production
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-super-secret-encryption-key-1234567890}
    depends_on:
      - postgres
      - redis
    networks:
      - wp-net

  frontend:
    build:
      context: ../frontend-user
      args:
        VITE_API_URL: https://${API_DOMAIN}
    container_name: whatsapp_panel_frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wp-frontend.rule=Host(`${USER_DOMAIN}`)"
      - "traefik.http.routers.wp-frontend.entrypoints=websecure"
      - "traefik.http.routers.wp-frontend.tls.certresolver=myresolver"
      - "traefik.http.services.wp-frontend.loadbalancer.server.port=80"
    networks:
      - wp-net

  admin-frontend:
    build:
      context: ../frontend-admin
      args:
        VITE_API_URL: https://${API_DOMAIN}
    container_name: whatsapp_panel_admin
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.wp-admin.rule=Host(`${ADMIN_DOMAIN}`)"
      - "traefik.http.routers.wp-admin.entrypoints=websecure"
      - "traefik.http.routers.wp-admin.tls.certresolver=myresolver"
      - "traefik.http.services.wp-admin.loadbalancer.server.port=80"
    networks:
      - wp-net

volumes:
  postgres_data:
    name: whatsapp-panel_prod_postgres_data
  redis_data:
    name: whatsapp-panel_prod_redis_data

networks:
  wp-net:
    driver: bridge
