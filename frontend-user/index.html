<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>WhatsApp Platform</title>
    <script>
      try {
        var cachedName = localStorage.getItem('cached_branding_name');
        if (cachedName) document.title = cachedName;
        var cachedFavicon = localStorage.getItem('cached_branding_favicon');
        if (cachedFavicon) {
            var link = document.createElement('link');
            link.rel = 'icon';
            link.href = cachedFavicon;
            document.head.appendChild(link);
        }
      } catch(e) {}
    </script>
    <meta name="description" content="Automate your business on WhatsApp with the ultimate WhatsApp Business API suite." />
    
    <!-- Open Graph for Social Media (WhatsApp, FB, etc.) -->
    <meta property="og:title" content="WhatsApp Platform" />
    <meta property="og:description" content="Automate your business on WhatsApp with the ultimate WhatsApp Business API suite." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WhatsApp Platform" />
    <script async src="https://checkout.razorpay.com/v1/checkout.js" onerror="console.warn('Razorpay script blocked or unavailable')"></script>
    <style>
      /* Stealth Google Translate Overrides */
      .skiptranslate > iframe { display: none !important; visibility: hidden !important; }
      .goog-te-banner-frame.skiptranslate, iframe.goog-te-banner-frame { display: none !important; visibility: hidden !important; }
      .VIpgJd-Zvi9od-ORHb-OEVmcd, .VIpgJd-Zvi9od-aZ2wEe-wOHMyf, .VIpgJd-Zvi9od-aZ2wEe-wOHMyf-ti6hGc { display: none !important; }
      html, body { top: 0px !important; position: static !important; margin-top: 0px !important; padding-top: 0px !important; }
      #goog-gt-tt, .goog-te-balloon-frame { display: none !important; }
      .goog-text-highlight { background-color: transparent !important; box-shadow: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Stealth Google Translate Instance -->
    <div id="google_translate_element" style="display:none;"></div>
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'en,hi,ar',
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
